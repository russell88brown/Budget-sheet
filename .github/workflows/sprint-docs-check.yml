name: Sprint Docs Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  sprint-docs-check:
    if: ${{ startsWith(github.head_ref, 'sprint/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate sprint documentation
        run: npm run sprint:check

